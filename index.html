<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>[[alternative reality]]: WEEK! — rect*repair</title>
    <link rel="icon" type="image/png" href="public/icon.png">
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.css">
    <link rel="stylesheet" href="css/styles.css">
</head>

<body>
    <header>
        <button class="nav-toggle" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>
        <div class="header-title">[[alternative reality]]: WEEK!</div>
        <nav>
            <a href="index.html" class="active">Map</a>
            <a href="calendar.html">Calendar</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main>
        <section class="map-section">
            <div id="map"></div>
            <div class="map-overlay">
                <h3>you are here</h3>
                <div class="coord" id="hover-coord">hover for coordinates</div>
            </div>
            <!-- <div class="stats-overlay">
                <div class="stat-box">
                    <div class="num">5</div>
                    <div class="label">Active Nodes</div>
                </div>
            </div> -->
            <div class="style-switcher" onclick="switchStyle(currentStyleIndex + 1)">
                <div class="label">Map Style [M]</div>
                <div id="style-indicator">CARTO Dark</div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="sidebar-section">
                <h2>Nodes</h2>
                <ul class="locations-list" id="nodes-list"></ul>
            </div>

            <div class="sidebar-section" id="mini-calendar">
                <!-- Calendar renders dynamically via calendar-sync.js -->
                <h2>Loading...</h2>
                <div class="calendar"></div>
            </div>

            <div class="sidebar-section">
                <h2>Upcoming</h2>
                <ul class="event-list" id="events-list">
                    <!-- Events render dynamically via calendar-sync.js -->
                </ul>
            </div>

        </aside>
    </main>

    <footer>
        <div class="footer-brand">[[rect*]] repair</div>
        <div class="footer-status">
            <span class="blink">●</span>
            <span>SYS::ONLINE</span>
        </div>
        <div class="footer-links">
            <a href="https://itch.io/jam/alternative-reality-jam">ITCH.IO</a>
            <a href="https://discord.gg/XWcHTZeQg4">DISCORD</a>
        </div>
        <div class="footer-time" id="current-time"></div>
    </footer>

    <script src="https://unpkg.com/maplibre-gl@4.1.1/dist/maplibre-gl.js"></script>
    <script src="nodes-data.js"></script>
    <script src="calendar-config.js"></script>
    <script src="calendar-sync.js"></script>
    <script src="app.js"></script>
</body>

</html>

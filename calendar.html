<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar — [[alternative reality]] conference</title>
    <link rel="icon" type="image/png" href="public/icon.png">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/calendar.css">
</head>

<body class="page-calendar">
    <header>
        <button class="nav-toggle" onclick="document.querySelector('nav').classList.toggle('open')">☰</button>
        <div class="header-title">[[alternative reality]]: WEEK!</div>
        <nav>
            <a href="index.html">Map</a>
            <a href="calendar.html" class="active">Calendar</a>
            <a href="about.html">About</a>
        </nav>
    </header>

    <main class="calendar-main">
        <div class="calendar-page">
            <!-- Timeline sidebar -->
            <div class="timeline-sidebar">
                <div class="tz-bar">
                    <span class="tz-label">TZ</span>
                    <select id="tz-select" onchange="changeTimezone(this.value)"></select>
                </div>
                <div class="filter-bar">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">all</button>
                    <button class="filter-btn" data-filter="online" onclick="setFilter('online')">online</button>
                    <button class="filter-btn" data-filter="irl" onclick="setFilter('irl')">IRL</button>
                </div>
                <div class="sidebar-header">
                    <h2 id="sidebar-title">TIMELINE</h2>
                    <button id="sidebar-back" onclick="showTimeline()">← timeline</button>
                </div>
                <div id="timeline" class="timeline">
                    <!-- Timeline renders dynamically via calendar-sync.js -->
                </div>
            </div>

            <!-- Calendar grid -->
            <div class="calendar-grid-container">
                <div class="calendar-grid-header">
                    <h2 id="calendar-month-title">LOADING...</h2>
                    <div class="calendar-nav">
                        <button onclick="navigateMonth(-1)">←</button>
                        <button onclick="navigateMonth(1)">→</button>
                    </div>
                </div>

                <div class="calendar-large" id="large-calendar">
                    <!-- Calendar renders dynamically via calendar-sync.js -->
                </div>


            </div>
        </div>
    </main>

    <footer>
        <div class="footer-brand">[[rect*]]repair</div>
        <div class="footer-status">
            <span class="blink">●</span>
            <span>SYS::ONLINE</span>
        </div>
        <div class="footer-links">
            <a href="https://itch.io/jam/alternative-reality-jam">ITCH.IO</a>
            <a href="https://discord.gg/XWcHTZeQg4">DISCORD</a>
        </div>
        <div class="footer-time" id="current-time"></div>
    </footer>
    <script src="calendar-config.js"></script>
    <script src="calendar-sync.js"></script>
    <script>
        function updateTime() {
            const now = new Date();
            const time = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('current-time').textContent = time;
        }
        updateTime();
        setInterval(updateTime, 1000);

        // Month navigation
        window.currentYear = calendarSync.isConfigured ? new Date().getFullYear() : 2026;
        window.currentMonth = calendarSync.isConfigured ? new Date().getMonth() : 2;

        function navigateMonth(delta) {
            window.currentMonth += delta;
            if (window.currentMonth > 11) {
                window.currentMonth = 0;
                window.currentYear++;
            } else if (window.currentMonth < 0) {
                window.currentMonth = 11;
                window.currentYear--;
            }
            calendarRenderer.renderLargeCalendar('large-calendar', window.currentYear, window.currentMonth);

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June',
                'July', 'August', 'September', 'October', 'November', 'December'];
            document.getElementById('calendar-month-title').textContent =
                `${monthNames[window.currentMonth].toUpperCase()} ${window.currentYear}`;
        }
    </script>
</body>

</html>
